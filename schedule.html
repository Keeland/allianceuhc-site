<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule — Alliance UHC</title>
    <meta name="description" content="View the Alliance UHC match calendar. See upcoming and past matches at a glance.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Open Graph -->
    <meta property="og:title" content="Schedule — Alliance UHC">
    <meta property="og:description" content="View the Alliance UHC match calendar. See upcoming and past matches.">
    <meta property="og:image" content="https://site.allianceuhc.space/logo.png">
    <meta property="og:url" content="https://site.allianceuhc.space/schedule.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Alliance UHC">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Schedule — Alliance UHC">
    <meta name="twitter:description" content="View the Alliance UHC match calendar. See upcoming and past matches.">
    <meta name="twitter:image" content="https://site.allianceuhc.space/logo.png">

    <!-- Theme color -->
    <meta name="theme-color" content="#FF6A00">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-orange: #FF6A00;
            --fire-yellow: #FFB800;
            --ember: #FF4500;
            --gold: #FFC940;
            --dark: #0A0A0C;
            --dark-surface: #111115;
            --dark-card: #16161B;
            --dark-border: #222228;
            --text-primary: #F0EDE6;
            --text-muted: #8A8694;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 50% 30% at 20% 10%, rgba(255,106,0,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 90%, rgba(255,69,0,0.03) 0%, transparent 70%);
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,106,0,0.08);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo { height: 32px; width: 32px; border-radius: 6px; }

        .nav-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--ember), var(--fire-orange), var(--fire-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-back:hover { color: var(--fire-orange); }

        .header {
            padding: 7rem 2rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
            animation: fadeInUp 0.6s ease forwards;
        }

        .header-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--fire-orange);
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 0.75rem;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--ember), var(--fire-orange), var(--fire-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Calendar Controls */
        .calendar-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
            animation: fadeInUp 0.6s ease 0.1s forwards;
            opacity: 0;
        }

        .calendar-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .cal-nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--dark-border);
            background: var(--dark-card);
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .cal-nav-btn:hover:not(:disabled) { border-color: rgba(255,106,0,0.3); color: var(--text-primary); }
        .cal-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .cal-month-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            min-width: 200px;
            text-align: center;
        }

        .cal-today-btn {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--dark-border);
            background: var(--dark-card);
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .cal-today-btn:hover { border-color: rgba(255,106,0,0.3); color: var(--text-primary); }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--dark-border);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            overflow: hidden;
        }

        .cal-day-header {
            background: var(--dark-surface);
            padding: 0.6rem 0.5rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .cal-day {
            background: var(--dark-card);
            min-height: 100px;
            padding: 0.5rem;
            position: relative;
            transition: background 0.2s;
        }

        .cal-day:hover { background: var(--dark-surface); }

        .cal-day.outside {
            opacity: 0.25;
        }

        .cal-day.today {
            box-shadow: inset 0 0 0 1px var(--fire-orange);
        }

        .cal-day-number {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .cal-day.today .cal-day-number {
            color: var(--fire-orange);
            font-weight: 700;
        }

        /* Match Pills */
        .cal-match {
            display: block;
            padding: 0.25rem 0.4rem;
            margin-bottom: 0.25rem;
            border-radius: 4px;
            background: rgba(255,106,0,0.08);
            border-left: 2px solid var(--fire-orange);
            font-size: 0.7rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cal-match:hover {
            background: rgba(255,106,0,0.15);
        }

        .cal-match.past {
            opacity: 0.5;
            border-left-color: var(--text-muted);
            background: rgba(255,255,255,0.03);
        }

        .cal-match.past:hover { opacity: 0.8; }

        .cal-match.soon {
            background: rgba(255,106,0,0.15);
            box-shadow: 0 0 8px rgba(255,106,0,0.2);
        }

        .cal-match-time {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: var(--fire-orange);
        }

        .cal-match.past .cal-match-time {
            color: var(--text-muted);
        }

        .cal-match-host {
            font-weight: 600;
            font-size: 0.65rem;
        }

        /* Match Detail Panel */
        .match-detail-panel {
            max-width: 1100px;
            margin: 1.25rem auto 0;
            padding: 0 2rem;
            display: none;
            animation: fadeInUp 0.3s ease forwards;
        }

        .match-detail-panel.visible { display: block; }

        .match-detail-card {
            background: var(--dark-card);
            border: 1px solid rgba(255,106,0,0.2);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .match-detail-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--fire-orange), var(--fire-yellow));
        }

        .match-detail-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--dark-border);
            background: var(--dark);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .match-detail-close:hover { border-color: rgba(255,106,0,0.3); color: var(--text-primary); }

        .match-detail-date {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-bottom: 0.15rem;
        }

        .match-detail-countdown {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--fire-orange);
            margin-bottom: 0.75rem;
        }

        .match-detail-badges {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .match-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
        }

        .badge-region { background: rgba(33,150,243,0.1); color: #64B5F6; }
        .badge-teams { background: rgba(156,39,176,0.1); color: #CE93D8; }
        .badge-host { background: rgba(255,106,0,0.1); color: var(--fire-orange); }
        .badge-past { background: rgba(158,158,158,0.1); color: #BDBDBD; }

        .match-detail-scenarios {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.75rem;
        }

        .match-scenario-tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--dark-border);
            color: var(--text-muted);
        }

        .match-detail-info {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .match-detail-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .match-detail-item svg {
            width: 13px;
            height: 13px;
            stroke: var(--text-muted);
            flex-shrink: 0;
        }

        /* Loading */
        .cal-loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .cal-loading h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        /* Mobile Agenda View */
        .agenda-view {
            display: none;
        }

        .agenda-day {
            margin-bottom: 1rem;
        }

        .agenda-date {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--dark-border);
            margin-bottom: 0.5rem;
        }

        .agenda-date.today-label { color: var(--fire-orange); }

        .agenda-match {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid var(--fire-orange);
        }

        .agenda-match:hover { border-color: rgba(255,106,0,0.25); }

        .agenda-match.past {
            opacity: 0.5;
            border-left-color: var(--text-muted);
        }

        .agenda-match.past:hover { opacity: 0.8; }

        .agenda-match-time {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--fire-orange);
            margin-bottom: 0.15rem;
        }

        .agenda-match.past .agenda-match-time { color: var(--text-muted); }

        .agenda-match-host {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .agenda-match-teams {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .agenda-empty {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer {
            border-top: 1px solid var(--dark-border);
            padding: 2rem;
        }

        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-copy { font-size: 0.7rem; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

        .footer-home {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-home:hover { color: var(--fire-orange); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .calendar-grid { display: none; }
            .agenda-view { display: block; }
            .footer-inner { flex-direction: column; gap: 0.75rem; }
        }

        @media (max-width: 500px) {
            nav { padding: 0.7rem 1.25rem; }
            .header { padding: 6rem 1.25rem 1.5rem; }
            .calendar-container { padding: 0 1.25rem 3rem; }
            .match-detail-panel { padding: 0 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="ambient"></div>

    <nav>
        <a href="index.html" class="nav-left">
            <img src="logo.png" alt="Alliance UHC" class="nav-logo">
            <span class="nav-title">Alliance UHC</span>
        </a>
        <a href="index.html" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Home
        </a>
    </nav>

    <div class="header">
        <div class="header-label">// Match Calendar</div>
        <h1><span>Schedule</span></h1>
        <p>Upcoming and past Alliance UHC matches at a glance.</p>
    </div>

    <div class="calendar-container">
        <div class="calendar-controls">
            <button class="cal-nav-btn" id="calPrev" title="Previous month">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="cal-month-title" id="calTitle"></div>
            <button class="cal-nav-btn" id="calNext" title="Next month">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="cal-today-btn" id="calToday">Today</button>
        </div>

        <!-- Desktop: Grid -->
        <div class="calendar-grid" id="calendarGrid">
            <div class="cal-loading" style="grid-column:1/-1;"><h3>Loading matches...</h3></div>
        </div>

        <!-- Mobile: Agenda -->
        <div class="agenda-view" id="agendaView"></div>
    </div>

    <div class="match-detail-panel" id="detailPanel">
        <div class="match-detail-card">
            <button class="match-detail-close" id="detailClose">&times;</button>
            <div class="match-detail-date" id="detailDate"></div>
            <div class="match-detail-countdown" id="detailCountdown"></div>
            <div class="match-detail-badges" id="detailBadges"></div>
            <div class="match-detail-scenarios" id="detailScenarios"></div>
            <div class="match-detail-info" id="detailInfo"></div>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <a href="index.html" class="footer-home">&larr; Back to Home</a>
            <div class="footer-copy">&copy; 2026 Alliance UHC &middot; Not affiliated with Mojang Studios</div>
        </div>
    </footer>

    <script>
        const WORKER_URL = 'https://matches.keelanmckev.workers.dev/matches';
        const API_FALLBACK = 'https://hosts.uhc.gg/api/matches/upcoming';

        const now = new Date();
        let currentMonth = now.getMonth();
        let currentYear = now.getFullYear();
        let matches = [];
        let selectedMatch = null;

        const calTitle = document.getElementById('calTitle');
        const calPrev = document.getElementById('calPrev');
        const calNext = document.getElementById('calNext');
        const calToday = document.getElementById('calToday');
        const calendarGrid = document.getElementById('calendarGrid');
        const agendaView = document.getElementById('agendaView');
        const detailPanel = document.getElementById('detailPanel');
        const detailClose = document.getElementById('detailClose');

        const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        // Helpers (same as index.html)
        function formatTeams(teams, size) {
            if (teams === 'ffa' || !size) return 'FFA';
            var mode = teams === 'chosen' ? 'Chosen' : teams === 'random' ? 'Random' : teams === 'captains' ? 'Captains' : teams;
            return 'To' + size + ' ' + mode;
        }

        function formatCountdown(opens) {
            var diff = new Date(opens) - new Date();
            if (diff <= 0) return 'Completed';
            var days = Math.floor(diff / 86400000);
            var hrs = Math.floor((diff % 86400000) / 3600000);
            var mins = Math.floor((diff % 3600000) / 60000);
            var secs = Math.floor((diff % 60000) / 1000);
            if (days > 0) return 'Opens in ' + days + 'd ' + hrs + 'h';
            if (hrs > 0) return 'Opens in ' + hrs + 'h ' + mins + 'm';
            return 'Opens in ' + mins + 'm ' + secs + 's';
        }

        function formatDateTime(opens) {
            var d = new Date(opens);
            return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) +
                   ' at ' +
                   d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }

        function formatTime(opens) {
            return new Date(opens).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        }

        function isPast(opens) {
            return new Date(opens) < new Date();
        }

        function isSoon(opens) {
            var diff = new Date(opens) - new Date();
            return diff > 0 && diff <= 3600000;
        }

        function sameDay(d1, d2) {
            return d1.getFullYear() === d2.getFullYear() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getDate() === d2.getDate();
        }

        function isToday(date) {
            return sameDay(date, new Date());
        }

        // Navigation limits: current month and next month only
        function getMinMonth() { return { m: now.getMonth(), y: now.getFullYear() }; }
        function getMaxMonth() {
            var m = now.getMonth() + 1;
            var y = now.getFullYear();
            if (m > 11) { m = 0; y++; }
            return { m: m, y: y };
        }

        function updateNavButtons() {
            var min = getMinMonth();
            var max = getMaxMonth();
            calPrev.disabled = (currentMonth === min.m && currentYear === min.y);
            calNext.disabled = (currentMonth === max.m && currentYear === max.y);
        }

        // Build calendar grid
        function buildCalendar() {
            calTitle.textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
            updateNavButtons();

            var firstDay = new Date(currentYear, currentMonth, 1).getDay();
            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            var daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

            var html = '';
            // Day headers
            DAY_NAMES.forEach(function(d) {
                html += '<div class="cal-day-header">' + d + '</div>';
            });

            // Previous month padding
            for (var i = firstDay - 1; i >= 0; i--) {
                var dayNum = daysInPrev - i;
                html += '<div class="cal-day outside"><div class="cal-day-number">' + dayNum + '</div></div>';
            }

            // Current month days
            for (var d = 1; d <= daysInMonth; d++) {
                var date = new Date(currentYear, currentMonth, d);
                var today = isToday(date);
                var dayMatches = matches.filter(function(m) {
                    return sameDay(new Date(m.opens), date);
                });

                html += '<div class="cal-day' + (today ? ' today' : '') + '">';
                html += '<div class="cal-day-number">' + d + '</div>';

                dayMatches.forEach(function(m, idx) {
                    var past = isPast(m.opens);
                    var soon = isSoon(m.opens);
                    var cls = 'cal-match' + (past ? ' past' : '') + (soon ? ' soon' : '');
                    html += '<div class="' + cls + '" data-match-idx="' + matches.indexOf(m) + '">';
                    html += '<div class="cal-match-time">' + formatTime(m.opens) + '</div>';
                    html += '<div class="cal-match-host">' + m.author + '</div>';
                    html += '</div>';
                });

                html += '</div>';
            }

            // Next month padding
            var totalCells = firstDay + daysInMonth;
            var remaining = (7 - (totalCells % 7)) % 7;
            for (var r = 1; r <= remaining; r++) {
                html += '<div class="cal-day outside"><div class="cal-day-number">' + r + '</div></div>';
            }

            calendarGrid.innerHTML = html;
            buildAgenda();

            // Attach click handlers to match pills
            calendarGrid.querySelectorAll('.cal-match').forEach(function(el) {
                el.addEventListener('click', function() {
                    showMatchDetail(matches[parseInt(this.dataset.matchIdx)]);
                });
            });
        }

        // Build mobile agenda view
        function buildAgenda() {
            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            var daysWithMatches = [];

            for (var d = 1; d <= daysInMonth; d++) {
                var date = new Date(currentYear, currentMonth, d);
                var dayMatches = matches.filter(function(m) {
                    return sameDay(new Date(m.opens), date);
                });
                if (dayMatches.length > 0) {
                    daysWithMatches.push({ date: date, matches: dayMatches });
                }
            }

            if (daysWithMatches.length === 0) {
                agendaView.innerHTML = '<div class="agenda-empty">No matches this month.</div>';
                return;
            }

            var html = '';
            daysWithMatches.forEach(function(day) {
                var today = isToday(day.date);
                var dateStr = day.date.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
                html += '<div class="agenda-day">';
                html += '<div class="agenda-date' + (today ? ' today-label' : '') + '">' + dateStr + (today ? ' — Today' : '') + '</div>';

                day.matches.forEach(function(m) {
                    var past = isPast(m.opens);
                    html += '<div class="agenda-match' + (past ? ' past' : '') + '" data-match-idx="' + matches.indexOf(m) + '">';
                    html += '<div class="agenda-match-time">' + formatTime(m.opens) + '</div>';
                    html += '<div class="agenda-match-host">' + m.author + '</div>';
                    html += '<div class="agenda-match-teams">' + formatTeams(m.teams, m.size) + ' &middot; ' + m.scenarios.join(', ') + '</div>';
                    html += '</div>';
                });

                html += '</div>';
            });

            agendaView.innerHTML = html;

            // Attach click handlers
            agendaView.querySelectorAll('.agenda-match').forEach(function(el) {
                el.addEventListener('click', function() {
                    showMatchDetail(matches[parseInt(this.dataset.matchIdx)]);
                });
            });
        }

        // Match detail panel
        function showMatchDetail(m) {
            selectedMatch = m;
            var past = isPast(m.opens);

            document.getElementById('detailDate').textContent = formatDateTime(m.opens);
            document.getElementById('detailCountdown').textContent = past ? 'Completed' : formatCountdown(m.opens);

            document.getElementById('detailBadges').innerHTML =
                '<span class="match-badge badge-host">' + m.author + '</span>' +
                '<span class="match-badge badge-teams">' + formatTeams(m.teams, m.size) + '</span>' +
                '<span class="match-badge badge-region">' + m.region + '</span>' +
                (past ? '<span class="match-badge badge-past">Past</span>' : '');

            document.getElementById('detailScenarios').innerHTML =
                m.scenarios.map(function(s) { return '<span class="match-scenario-tag">' + s + '</span>'; }).join('');

            document.getElementById('detailInfo').innerHTML =
                '<div class="match-detail-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' + m.slots + ' slots</div>' +
                '<div class="match-detail-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>' + m.mapSize + 'x' + m.mapSize + '</div>' +
                '<div class="match-detail-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + m.length + 'min</div>' +
                '<div class="match-detail-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 7.5l3.5-3.5h3v3L16 10.5"/></svg>PvP ' + m.pvpEnabledAt + 'min</div>' +
                '<div class="match-detail-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>' + m.version + '</div>';

            detailPanel.classList.add('visible');
            detailPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideMatchDetail() {
            detailPanel.classList.remove('visible');
            selectedMatch = null;
        }

        detailClose.addEventListener('click', hideMatchDetail);

        // Fetch matches
        function fetchMatches() {
            fetch(WORKER_URL)
                .then(function(r) {
                    if (!r.ok) throw new Error('Worker error');
                    return r.json();
                })
                .catch(function() {
                    // Fallback to hosts.uhc.gg directly
                    return fetch(API_FALLBACK)
                        .then(function(r) {
                            if (!r.ok) throw new Error('API error');
                            return r.json();
                        })
                        .then(function(data) {
                            return data.filter(function(m) { return m.tags && m.tags.includes('Alliance') && !m.removed; });
                        });
                })
                .then(function(data) {
                    matches = data.sort(function(a, b) { return new Date(a.opens) - new Date(b.opens); });
                    buildCalendar();
                })
                .catch(function() {
                    matches = [];
                    buildCalendar();
                });
        }

        // Nav events
        calPrev.addEventListener('click', function() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            hideMatchDetail();
            buildCalendar();
        });

        calNext.addEventListener('click', function() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            hideMatchDetail();
            buildCalendar();
        });

        calToday.addEventListener('click', function() {
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            hideMatchDetail();
            buildCalendar();
        });

        // Update countdowns every second
        function updateDetailCountdown() {
            if (selectedMatch && !isPast(selectedMatch.opens)) {
                document.getElementById('detailCountdown').textContent = formatCountdown(selectedMatch.opens);
            }
        }

        // Init
        fetchMatches();
        setInterval(fetchMatches, 60000);
        setInterval(updateDetailCountdown, 1000);
    </script>
</body>
</html>
